<!DOCTYPE html>
<html>
<head>
    <title>PAS Freight Chat Widget</title>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Floating Chat Button - Bottom Right Corner */
        #pasfreight-chat-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: none;
            z-index: 999999;
        }
        
        #pasfreight-chat-btn:hover {
            transform: scale(1.05);
        }
        
        .chat-icon {
            font-size: 24px;
            color: white;
        }
        
        .notification-badge {
            position: absolute;
            top: -3px;
            right: -3px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Chat Window - Smaller Size */
        #pasfreight-chat-window {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 350px;
            height: 480px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
            z-index: 999998;
            border: none;
            overflow: hidden;
            flex-direction: column;
        }
        
        /* Chat Window Header - Compact */
        .chat-header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-info {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .avatar {
            width: 28px;
            height: 28px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .header-text h3 {
            font-size: 12px;
            font-weight: 600;
        }
        
        .header-text p {
            font-size: 8px;
            opacity: 0.8;
        }
        
        .close-chat {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-chat:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* Messages Area - Compact */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 10px;
            display: flex;
        }
        
        .user-message {
            justify-content: flex-end;
        }
        
        .bot-message {
            justify-content: flex-start;
        }
        
        .bubble {
            max-width: 85%;
            padding: 6px 10px;
            border-radius: 14px;
            font-size: 11px;
            line-height: 1.35;
        }
        
        .user-message .bubble {
            background: #2a5298;
            color: white;
            border-bottom-right-radius: 3px;
        }
        
        .bot-message .bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 3px;
        }
        
        /* Service Buttons - Compact */
        .service-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        
        .service-btn {
            background: #f0f2f5;
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 10px;
            cursor: pointer;
        }
        
        .service-btn:hover {
            background: #2a5298;
            color: white;
        }
        
        .main-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        .main-btn {
            flex: 1;
            background: #1e3c72;
            color: white;
            border: none;
            padding: 7px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 500;
        }
        
        .main-btn:hover {
            background: #2a5298;
        }
        
        .sub-buttons {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        
        .sub-btn {
            background: #e9ecef;
            border: none;
            padding: 5px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 10px;
        }
        
        .sub-btn:hover {
            background: #2a5298;
            color: white;
        }
        
        .contact-info {
            background: #f0f2f5;
            padding: 8px;
            border-radius: 10px;
            margin-top: 6px;
            font-size: 10px;
        }
        
        /* Input Area - Compact */
        .chat-input {
            padding: 10px;
            background: white;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 8px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 12px;
            outline: none;
        }
        
        .chat-input input:focus {
            border-color: #2a5298;
        }
        
        .chat-input button {
            background: #2a5298;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
        }
        
        .typing {
            display: inline-flex;
            gap: 3px;
            padding: 3px 0;
        }
        
        .typing span {
            width: 5px;
            height: 5px;
            background: #999;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
        
        @media (max-width: 500px) {
            #pasfreight-chat-window {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Chat Button -->
    <button id="pasfreight-chat-btn">
        <span class="chat-icon">💬</span>
        <span class="notification-badge" id="notificationBadge" style="display: none;">1</span>
    </button>
    
    <!-- Chat Window -->
    <div id="pasfreight-chat-window">
        <div class="chat-header">
            <div class="header-info">
                <div class="avatar">📦</div>
                <div class="header-text">
                    <h3>PAS Freight Services</h3>
                    <p>24/7 Logistics Support</p>
                </div>
            </div>
            <button class="close-chat" id="closeChatBtn">✕</button>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="bubble">👋 Welcome! How can I help?</div>
            </div>
            <div class="message bot-message">
                <div class="bubble">
                    <div class="main-buttons">
                        <button class="main-btn" onclick="showMainMenu()">📦 Menu</button>
                        <button class="main-btn" onclick="showContact()">📞 Contact</button>
                        <button class="main-btn" onclick="showAbout()">🏢 About</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type message..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const chatBtn = document.getElementById('pasfreight-chat-btn');
        const chatWindow = document.getElementById('pasfreight-chat-window');
        const closeChatBtn = document.getElementById('closeChatBtn');
        const notificationBadge = document.getElementById('notificationBadge');
        const messagesDiv = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        let isOpen = false;
        let notified = false;
        let step = null;
        let userName = '';
        let userEmail = '';
        let userPhone = '';
        
        chatBtn.addEventListener('click', function() {
            if (isOpen) {
                chatWindow.style.display = 'none';
                isOpen = false;
            } else {
                chatWindow.style.display = 'flex';
                isOpen = true;
                notificationBadge.style.display = 'none';
                notified = true;
            }
        });
        
        closeChatBtn.addEventListener('click', function() {
            chatWindow.style.display = 'none';
            isOpen = false;
        });
        
        setTimeout(function() {
            if (!isOpen && !notified) {
                notificationBadge.style.display = 'flex';
            }
        }, 30000);
        
        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            messagesDiv.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }
        
        function addContactInfo(title, numbers, emails) {
            let html = `<div class="contact-info"><strong>${title}</strong><br>`;
            if (numbers && numbers.length) {
                numbers.forEach(num => { html += `📞 ${num}<br>`; });
            }
            if (emails && emails.length) {
                emails.forEach(email => { html += `✉️ ${email}<br>`; });
            }
            html += `</div>`;
            addMessage(html, false);
            step = 'name';
            addMessage("📝 Your name?", false);
        }
        
        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message bot-message';
            div.id = 'typing';
            div.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
            messagesDiv.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
        
        window.showMainMenu = function() {
            addMessage("Main Menu", true);
            const div = document.createElement('div');
            div.className = 'message bot-message';
            div.innerHTML = `<div class="bubble">📦 <strong>Services:</strong><br>
                <div class="service-buttons">
                    <button class="service-btn" onclick="showImportOptions()">📥 IMPORT</button>
                    <button class="service-btn" onclick="showExportOptions()">📤 EXPORT</button>
                    <button class="service-btn" onclick="showCustoms()">📋 CUSTOMS</button>
                    <button class="service-btn" onclick="showCargo()">🚚 CARGO</button>
                </div>
            </div>`;
            messagesDiv.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        };
        
        window.showContact = function() {
            addMessage("Contact Us", true);
            addContactInfo("PAS FREIGHT", 
                ["+91 90361 01201"],
                ["shivu@pasfreight.com"]);
        };
        
        window.showAbout = function() {
            addMessage("About Us", true);
            addMessage("🏢 PAS Freight Services\n📍 Bangalore\n📞 +91 90361 01201\n✅ WCA & GLA Certified\n🌟 8+ years experience", false);
        };
        
        window.showImportOptions = function() {
            addMessage("IMPORT", true);
            const div = document.createElement('div');
            div.className = 'message bot-message';
            div.innerHTML = `<div class="bubble">📥 <strong>Select Mode:</strong><br>
                <div class="sub-buttons">
                    <button class="sub-btn" onclick="showImportAir()">✈️ AIR</button>
                    <button class="sub-btn" onclick="showImportSea()">🚢 SEA</button>
                </div>
            </div>`;
            messagesDiv.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        };
        
        window.showImportAir = function() {
            addMessage("IMPORT - AIR", true);
            addContactInfo("AIR FREIGHT", 
                ["+91 99869 42772", "+91 63615 21413"],
                ["gj@pasfreight.com"]);
        };
        
        window.showImportSea = function() {
            addMessage("IMPORT - SEA", true);
            addContactInfo("SEA FREIGHT", 
                ["+91 93648 81371", "+91 63615 21413"],
                ["vinodh@pasfreight.com"]);
        };
        
        window.showExportOptions = function() {
            addMessage("EXPORT", true);
            const div = document.createElement('div');
            div.className = 'message bot-message';
            div.innerHTML = `<div class="bubble">📤 <strong>Select Mode:</strong><br>
                <div class="sub-buttons">
                    <button class="sub-btn" onclick="showExportAir()">✈️ AIR</button>
                    <button class="sub-btn" onclick="showExportSea()">🚢 SEA</button>
                </div>
            </div>`;
            messagesDiv.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        };
        
        window.showExportAir = function() {
            addMessage("EXPORT - AIR", true);
            addContactInfo("EXPORT AIR", 
                ["+91 93648 81371", "+91 63615 26659"],
                ["vinodh@pasfreight.com"]);
        };
        
        window.showExportSea = function() {
            addMessage("EXPORT - SEA", true);
            addContactInfo("EXPORT SEA", 
                ["+91 93648 81371", "+91 63615 26659"],
                ["vinodh@pasfreight.com"]);
        };
        
        window.showCustoms = function() {
            addMessage("CUSTOMS", true);
            addContactInfo("CUSTOMS CLEARANCE", 
                ["+91 63615 26664"],
                ["ajith@pasfreight.com"]);
        };
        
        window.showCargo = function() {
            addMessage("CARGO", true);
            const div = document.createElement('div');
            div.className = 'message bot-message';
            div.innerHTML = `<div class="bubble">🚚 <strong>Select Type:</strong><br>
                <div class="sub-buttons">
                    <button class="sub-btn" onclick="showDomesticCargo()">🇮🇳 DOMESTIC</button>
                    <button class="sub-btn" onclick="showInternationalCargo()">🌍 INTERNATIONAL</button>
                </div>
            </div>`;
            messagesDiv.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        };
        
        window.showDomesticCargo = function() {
            addMessage("DOMESTIC CARGO", true);
            addContactInfo("DOMESTIC", 
                ["+91 63615 26659"],
                ["kavan@pasfreight.com"]);
        };
        
        window.showInternationalCargo = function() {
            addMessage("INTERNATIONAL CARGO", true);
            addContactInfo("INTERNATIONAL", 
                ["+91 63615 26659"],
                ["kavan@pasfreight.com"]);
        };
        
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            userInput.value = '';
            
            if (step === 'name') {
                userName = text;
                step = 'email';
                addMessage(text, true);
                addMessage("📧 Email?", false);
                return;
            }
            
            if (step === 'email') {
                userEmail = text;
                step = 'phone';
                addMessage(text, true);
                addMessage("📞 Phone? (type 'skip')", false);
                return;
            }
            
            if (step === 'phone') {
                if (text !== 'skip') userPhone = text;
                addMessage(text, true);
                addMessage(`✅ Thanks ${userName}! We'll contact you within 24 hours.`, false);
                step = null;
                userName = userEmail = userPhone = '';
                return;
            }
            
            addMessage(text, true);
            showTyping();
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                hideTyping();
                addMessage(data.reply, false);
            } catch(error) {
                hideTyping();
                addMessage('📞 Call +91 90361 01201 for help.', false);
            }
        }
        
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
